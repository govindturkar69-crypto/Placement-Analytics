{% extends "base.html" %}
{% block title %}Add Company – Placement Analytics{% endblock %}

{% block content %}
<div class="page-header">
  <h1>➕ Add Company</h1>
  <p>Add a new company to the system</p>
</div>

<div class="card" style="max-width:700px">
  <div class="form-grid">
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" id="company_name" class="form-control" placeholder="Google">
    </div>
    <div class="form-group">
      <label>Package Offered (LPA)</label>
      <input type="number" id="package" class="form-control" step="0.5" placeholder="12.5">
    </div>
    <div class="form-group" style="grid-column:1/-1">
      <label>Required Skills (comma separated)</label>
      <input type="text" id="required_skills" class="form-control" placeholder="Python, DSA, SQL">
    </div>
    <div class="form-group">
      <label>Visit Date</label>
      <input type="date" id="visit_date" class="form-control">
    </div>
  </div>
  <div class="form-actions">
    <button class="btn-primary btn-sm" style="width:auto;padding:11px 24px" onclick="submitCompany()">Save Company</button>
    <a href="{{ url_for('companies') }}" class="btn-outline">Cancel</a>
  </div>
</div>

<script>
function submitCompany() {
  const fields = ['company_name','package','required_skills','visit_date'];
  const form = document.createElement('form');
  form.method='POST'; form.action='/add_company';
  fields.forEach(f => {
    const inp = document.createElement('input');
    inp.type='hidden'; inp.name=f; inp.value=document.getElementById(f).value;
    form.appendChild(inp);
  });
  document.body.appendChild(form); form.submit();
}
</script>
{% endblock %}
