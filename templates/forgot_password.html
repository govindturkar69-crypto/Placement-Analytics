<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e40af,#2563eb,#0ea5e9);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:white;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.2)}
    .icon{text-align:center;font-size:48px;margin-bottom:16px}
    h1{text-align:center;font-size:22px;margin-bottom:8px;color:#1e293b}
    p{text-align:center;color:#64748b;font-size:14px;margin-bottom:24px}
    label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#1e293b}
    input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;margin-bottom:16px;font-family:'Inter',sans-serif}
    input:focus{border-color:#2563eb}
    button{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
    .back{display:block;text-align:center;margin-top:16px;color:#64748b;font-size:13px;text-decoration:none}
    .back:hover{color:#2563eb}
    .alert{padding:12px;border-radius:10px;font-size:14px;margin-bottom:16px}
    .alert-success{background:#ecfdf5;color:#059669}
    .alert-danger{background:#fef2f2;color:#dc2626}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Forgot Password?</h1>
  <p>Enter your email — we'll send you a reset link</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <div>
    <label>Email Address</label>
    <input type="email" id="email" placeholder="govind@example.com">
    <button onclick="submitForm()">Send Reset Link 📧</button>
  </div>
  <a href="{{ url_for('login') }}" class="back">← Back to Login</a>
</div>

<script>
function submitForm() {
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/forgot_password';
  const inp = document.createElement('input');
  inp.type = 'hidden';
  inp.name = 'email';
  inp.value = document.getElementById('email').value;
  form.appendChild(inp);
  document.body.appendChild(form);
  form.submit();
}
</script>
</body>
</html>
