<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – Placement Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #050816;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── GRID FLOOR ── */
    .grid-floor {
      position: fixed;
      bottom: -100px; left: 50%;
      transform: translateX(-50%) rotateX(75deg);
      width: 200vw; height: 200vw;
      background-image:
        linear-gradient(rgba(99,102,241,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.15) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 1;
      animation: gridScroll 8s linear infinite;
    }
    @keyframes gridScroll {
      0%   { background-position: 0 0; }
      100% { background-position: 0 60px; }
    }

    /* ── GLOW ORBS ── */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
      animation: glowPulse 6s ease-in-out infinite;
    }
    .glow-1 {
      width: 400px; height: 400px;
      background: rgba(99,102,241,0.12);
      top: -100px; left: -100px;
    }
    .glow-2 {
      width: 300px; height: 300px;
      background: rgba(16,185,129,0.08);
      bottom: -50px; right: -50px;
      animation-delay: -3s;
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* ── CUBES ── */
    .scene {
      position: fixed; inset: 0; z-index: 1;
      perspective: 1000px; pointer-events: none;
    }
    .cube {
      position: absolute;
      transform-style: preserve-3d;
      animation: cubeRotate linear infinite;
    }
    .cube-face {
      position: absolute;
      border: 1px solid rgba(99,102,241,0.25);
      background: rgba(99,102,241,0.03);
    }
    @keyframes cubeRotate {
      0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
    }

    /* ── PARTICLE CANVAS ── */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; }

    /* ── CARD ── */
    .card-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 380px;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 36px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.5),
        0 0 80px rgba(99,102,241,0.07);
      animation: cardFloat 6s ease-in-out infinite, cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardFloat {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%, rgba(99,102,241,0.04) 100%);
      pointer-events: none;
    }

    /* ── ICON ── */
    .icon-wrap {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(16,185,129,0.1));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
      position: relative;
      animation: iconPulse 3s ease-in-out infinite;
      box-shadow: 0 0 30px rgba(99,102,241,0.2);
    }
    @keyframes iconPulse {
      0%,100% { box-shadow: 0 0 20px rgba(99,102,241,0.2); }
      50% { box-shadow: 0 0 40px rgba(99,102,241,0.4); }
    }

    /* ── TEXT ── */
    .card-title {
      font-size: 22px; font-weight: 700;
      color: white; text-align: center;
      margin-bottom: 6px; letter-spacing: -0.4px;
    }
    .card-sub {
      font-size: 13.5px; color: rgba(255,255,255,0.35);
      text-align: center; margin-bottom: 28px; line-height: 1.5;
    }

    /* ── ALERT ── */
    .alert {
      padding: 11px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .alert-danger  { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }

    /* ── FORM ── */
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.4); margin-bottom: 8px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 15px;
      opacity: 0.35; pointer-events: none; transition: opacity 0.2s;
    }
    .input-wrap:focus-within .input-icon { opacity: 0.8; }
    .form-control {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      font-size: 14px; color: white; outline: none;
      font-family: inherit; transition: all 0.25s;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.2); }
    .form-control:focus {
      border-color: rgba(99,102,241,0.6);
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    /* ── BUTTON ── */
    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.25s;
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
      position: relative; overflow: hidden;
      letter-spacing: 0.2px;
    }
    .btn-submit::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }
    .btn-submit:hover::before { left: 100%; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(99,102,241,0.5); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit.loading { opacity: 0.7; pointer-events: none; }

    /* ── BACK LINK ── */
    .back-link {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 20px;
      font-size: 13px; color: rgba(255,255,255,0.3);
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: #818cf8; }

    /* Mobile */
    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="grid-floor"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="scene" id="scene"></div>
<canvas id="bg-canvas"></canvas>

<div class="card-wrap">
  <div class="card" id="mainCard">

    <div class="icon-wrap">🔑</div>

    <div class="card-title">Forgot Password?</div>
    <div class="card-sub">Enter your email and we'll send<br>you a reset link</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          {% if category == 'danger' %}❌{% else %}✅{% endif %}
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <div>
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" class="form-control"
               placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-submit" onclick="submitForm()" id="submitBtn">
        Send Reset Link →
      </button>
    </div>

    <a href="{{ url_for('login') }}" class="back-link">
      ← Back to Login
    </a>

  </div>
</div>

<script>
// 3D Cubes
const scene = document.getElementById('scene');
[
  {x:10,y:20,s:25,d:12,c:'99,102,241'},{x:88,y:15,s:18,d:16,c:'16,185,129'},
  {x:85,y:75,s:30,d:11,c:'99,102,241'},{x:6,y:80,s:22,d:14,c:'245,158,11'},
].forEach(({x,y,s,d,c}) => {
  const cube = document.createElement('div');
  cube.className = 'cube';
  cube.style.cssText = `left:${x}%;top:${y}%;width:${s}px;height:${s}px;animation-duration:${d}s`;
  ['front','back','left','right','top','bottom'].forEach(f => {
    const face = document.createElement('div');
    face.className = `cube-face`;
    face.style.cssText = `width:${s}px;height:${s}px;border-color:rgba(${c},0.25);background:rgba(${c},0.03)`;
    const h = s/2;
    const transforms = {
      front:`translateZ(${h}px)`, back:`rotateY(180deg) translateZ(${h}px)`,
      left:`rotateY(-90deg) translateZ(${h}px)`, right:`rotateY(90deg) translateZ(${h}px)`,
      top:`rotateX(90deg) translateZ(${h}px)`, bottom:`rotateX(-90deg) translateZ(${h}px)`
    };
    face.style.transform = transforms[f];
    cube.appendChild(face);
  });
  scene.appendChild(cube);
});

// Particles
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
const particles = Array.from({length:50}, () => ({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.2+0.3,
  vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
  o:Math.random()*0.4+0.1,
  c:Math.random()>0.5?'99,102,241':'16,185,129'
}));
(function draw() {
  ctx.clearRect(0,0,W,H);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.c},${p.o})`; ctx.fill();
  });
  particles.forEach((a,i) => particles.slice(i+1).forEach(b => {
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<90){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=`rgba(99,102,241,${0.06*(1-d/90)})`;ctx.lineWidth=0.5;ctx.stroke();}
  }));
  requestAnimationFrame(draw);
})();

// Tilt
const card = document.getElementById('mainCard');
document.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const dx = (e.clientX - r.left - r.width/2) / r.width;
  const dy = (e.clientY - r.top - r.height/2) / r.height;
  card.style.transform = `rotateX(${-dy*6}deg) rotateY(${dx*6}deg)`;
});
document.addEventListener('mouseleave', () => { card.style.transform = ''; });

// Submit
function submitForm() {
  const email = document.getElementById('email').value.trim();
  if (!email) {
    card.style.transform = 'translateX(-8px)';
    setTimeout(()=>card.style.transform='translateX(8px)',80);
    setTimeout(()=>card.style.transform='translateX(0)',160);
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading');
  btn.textContent = 'Sending...';
  const form = document.createElement('form');
  form.method = 'POST'; form.action = '/forgot_password';
  const inp = document.createElement('input');
  inp.type='hidden'; inp.name='email'; inp.value=email;
  form.appendChild(inp);
  document.body.appendChild(form);
  form.submit();
}
document.addEventListener('keydown', e => { if(e.key==='Enter') submitForm(); });
</script>
</body>
</html>
