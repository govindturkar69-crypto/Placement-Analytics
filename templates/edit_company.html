{% extends "base.html" %}
{% block title %}Edit Company{% endblock %}

{% block content %}
<div class="page-header">
  <h1>✏️ Edit Company</h1>
  <p>Update company information</p>
</div>

<div class="card" style="max-width:700px">
  <div class="form-grid">
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" id="company_name" class="form-control" 
             value="{{ company[1] }}">
    </div>
    <div class="form-group">
      <label>Package (LPA)</label>
      <input type="number" id="package" class="form-control" 
             step="0.5" value="{{ company[2] }}">
    </div>
    <div class="form-group" style="grid-column:1/-1">
      <label>Required Skills</label>
      <input type="text" id="required_skills" class="form-control" 
             value="{{ company[3] }}">
    </div>
    <div class="form-group">
      <label>Visit Date</label>
      <input type="date" id="visit_date" class="form-control" 
             value="{{ company[4] }}">
    </div>
  </div>
  <div class="form-actions">
    <button class="btn-primary" style="width:auto;padding:11px 24px" 
            onclick="submitEdit()">
      💾 Save Changes
    </button>
    <a href="{{ url_for('companies') }}" class="btn-outline">Cancel</a>
  </div>
</div>

<script>
function submitEdit() {
  const fields = ['company_name','package','required_skills','visit_date'];
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/edit_company/{{ company[0] }}';
  fields.forEach(f => {
    const inp = document.createElement('input');
    inp.type = 'hidden';
    inp.name = f;
    inp.value = document.getElementById(f).value;
    form.appendChild(inp);
  });
  document.body.appendChild(form);
  form.submit();
}
</script>
{% endblock %}
