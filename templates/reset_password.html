<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1e40af,#2563eb,#0ea5e9);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:white;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.2)}
    .icon{text-align:center;font-size:48px;margin-bottom:16px}
    h1{text-align:center;font-size:22px;margin-bottom:8px;color:#1e293b}
    p{text-align:center;color:#64748b;font-size:14px;margin-bottom:24px}
    label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#1e293b}
    input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;margin-bottom:16px;font-family:'Inter',sans-serif}
    input:focus{border-color:#2563eb}
    button{width:100%;padding:13px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
    .alert{padding:12px;border-radius:10px;font-size:14px;margin-bottom:16px}
    .alert-success{background:#ecfdf5;color:#059669}
    .alert-danger{background:#fef2f2;color:#dc2626}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🔑</div>
  <h1>Reset Password</h1>
  <p>Enter your new password below</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <div>
    <label>New Password</label>
    <input type="password" id="password" placeholder="Enter new password">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Confirm new password">
    <button onclick="submitForm()">Reset Password ✅</button>
  </div>
</div>

<script>
function submitForm() {
  const pass = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (pass !== confirm) {
    alert('Passwords do not match!');
    return;
  }
  if (pass.length < 6) {
    alert('Password must be at least 6 characters!');
    return;
  }
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/reset_password/{{ token }}';
  const inp = document.createElement('input');
  inp.type = 'hidden';
  inp.name = 'password';
  inp.value = pass;
  form.appendChild(inp);
  document.body.appendChild(form);
  form.submit();
}
</script>
</body>
</html>
