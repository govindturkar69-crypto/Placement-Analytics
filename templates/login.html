<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Placement Analytics</title>
  <style>
.login-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e40af,#2563eb,#0ea5e9)}
.login-card{background:white;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.2)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{width:60px;height:60px;background:linear-gradient(135deg,#2563eb,#10b981);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}
.login-logo h1{font-size:22px;font-weight:700;color:#1e293b}
.login-logo p{color:#64748b;font-size:14px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#1e293b}
.form-control{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;font-family:'Inter',sans-serif}
.form-control:focus{border-color:#2563eb}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.alert{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px}
.alert-danger{background:#fef2f2;color:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif}
</style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🎓</div>
      <h1>Placement Analytics</h1>
      <p>Sign in to your account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="govind@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button class="btn-primary" onclick="submitLogin()">Sign In →</button>
      <p style="text-align:center;margin-top:12px;font-size:13px">
        <a href="{{ url_for('forgot_password') }}" 
           style="color:#2563eb;text-decoration:none;font-weight:600">
          🔐 Forgot Password?
        </a>
      </p>
    </div>

    
  </div>
</div>

<script>
function submitLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/login';
  ['email','password'].forEach((k,i) => {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = k; inp.value = [email,password][i];
    form.appendChild(inp);
  });
  document.body.appendChild(form);
  form.submit();
}
</script>
</body>
</html>
